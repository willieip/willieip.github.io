<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello</title>
    <meta name="description" content="Hello there">
    <link rel="canonical" href="https://willieip.me/imessage-preview/">

    <meta property="og:title" content="Hello" />
    <meta property="og:description" content="Hello there">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://willieip.me/imessage-preview/">
    <meta property="og:image" content="https://willieip.me/imessage-preview/preview.png">
    <meta property="og:image:secure_url" content="https://willieip.me/imessage-preview/preview.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="600">
    <meta property="og:image:height" content="315">
    <meta property="og:image:alt" content="A black message bubble with white text that says Hello there">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Hello">
    <meta name="twitter:description" content="Hello there">
    <meta name="twitter:image" content="https://willieip.me/imessage-preview/preview.png">

    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f5f7;
        color: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px;
        background: #f5f5f7;
      }

      .bubble {
        width: min(900px, 100%);
        border-radius: 56px;
        background: #000000;
        padding: clamp(42px, 9vw, 92px) clamp(34px, 8vw, 88px);
        color: #ffffff;
        font-size: clamp(56px, 11vw, 132px);
        font-weight: 700;
        letter-spacing: 0;
        line-height: 0.96;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="bubble" aria-label="Hello there">Hello there</main>
  </body>
</html>
