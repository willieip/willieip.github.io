<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello</title>
    <meta name="description" content="Hello there">
    <link rel="canonical" href="https://willieip.me/imessage-preview/">

    <meta property="og:title" content="Hello" />
    <meta property="og:description" content="Hello there">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://willieip.me/imessage-preview/">
    <meta property="og:image" content="https://willieip.me/imessage-preview/preview.png">
    <meta property="og:image:secure_url" content="https://willieip.me/imessage-preview/preview.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Black background with large white text that says Hello there">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Hello">
    <meta name="twitter:description" content="Hello there">
    <meta name="twitter:image" content="https://willieip.me/imessage-preview/preview.png">

    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #000000;
        color: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px;
        background: #000000;
      }

      .message {
        width: min(1000px, 100%);
        color: #ffffff;
        font-size: clamp(64px, 14vw, 172px);
        font-weight: 700;
        letter-spacing: 0;
        line-height: 0.96;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="message" aria-label="Hello there">Hello there</main>
  </body>
</html>
